syntax = "proto3";

package addons.gcphcp.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/internal/addon/gcphcp";

// GCPHCPClusterSpec defines the desired state of a GCP Hosted Control Plane cluster.
// This is the canonical spec used by both the managed resource API and the delivery agent.
message GCPHCPClusterSpec {
  // Endpoint access configuration for the cluster API server.
  string endpoint_access = 1 [(buf.validate.field).string.min_len = 1];

  // Release version of the cluster (e.g., "4.18.0").
  string release_version = 2 [(buf.validate.field).string.min_len = 1];

  // Channel group for the cluster (e.g., "stable", "fast", "candidate").
  string channel_group = 3 [(buf.validate.field).string.min_len = 1];

  // Nodepools to provision for the cluster.
  repeated Nodepool nodepools = 4 [(buf.validate.field).repeated.min_items = 1];
}

// Nodepool describes a node pool in the GCP HCP cluster.
message Nodepool {
  // Short identifier for the nodepool.
  string id = 1 [(buf.validate.field).string = {min_len: 1, max_len: 10, pattern: "^[a-z][-a-z0-9]*$"}];

  // Number of replicas (nodes) in the pool.
  int32 replicas = 2 [(buf.validate.field).int32.gt = 0];

  // Instance type for the nodes (e.g., "n1-standard-4").
  string instance_type = 3 [(buf.validate.field).string.min_len = 1];

  // Root volume size in GB.
  int32 root_volume_size = 4 [(buf.validate.field).int32.gt = 0];

  // Root volume type (e.g., "pd-standard", "pd-ssd").
  string root_volume_type = 5 [(buf.validate.field).string.min_len = 1];

  // Enable auto-repair for nodes in this pool.
  bool auto_repair = 6 [(buf.validate.field).required = true];

  // Upgrade type strategy (e.g., "Replace", "InPlace").
  string upgrade_type = 7 [(buf.validate.field).string.min_len = 1];
}
