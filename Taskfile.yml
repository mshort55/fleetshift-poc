version: '3'

dotenv: ['.env']

includes:
  podman:
    taskfile: ./deploy/podman/Taskfile.yml
    dir: ./deploy/podman
    aliases: [pd]
    vars:
      DEPLOY_MODE_INPUT: '{{.DEPLOY_MODE | default ""}}'
      DB_INPUT: '{{.DB | default ""}}'
      AUTH_INPUT: '{{.AUTH | default ""}}'
      DEV_INPUT: '{{.DEV | default ""}}'
  kubernetes:
    taskfile: ./deploy/kubernetes/Taskfile.yml
    dir: ./deploy/kubernetes
    aliases: [k8s]
  keycloak:
    taskfile: ./deploy/keycloak/Taskfile.yml
    dir: ./deploy/keycloak
    aliases: [kc]

vars:
  IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
  DEV_REGISTRY: '{{.DEV_REGISTRY | default ""}}'

tasks:
  default:
    silent: true
    cmds:
      - task --list

  build:all:
    desc: Build all binaries
    deps: [build:server, build:cli, build:ocp-engine]

  build:server:
    desc: Build the server binary
    dir: fleetshift-server
    cmds:
      - go build -o ../bin/fleetshift ./cmd/fleetshift

  build:cli:
    desc: Build the fleetctl CLI binary
    dir: fleetshift-cli
    cmds:
      - go build -o ../bin/fleetctl ./cmd/fleetctl

  build:ocp-engine:
    desc: Build the ocp-engine binary
    dir: ocp-engine
    cmds:
      - go build -o ../bin/ocp-engine .

  test:all:
    desc: Run unit tests for all modules
    deps: [test:server, test:cli, test:ocp-engine]

  test:server:
    desc: Run server tests
    dir: fleetshift-server
    cmds:
      - go test -count=1 ./...

  test:cli:
    desc: Run CLI tests
    dir: fleetshift-cli
    cmds:
      - go test -count=1 ./...

  test:ocp-engine:
    desc: Run ocp-engine tests
    dir: ocp-engine
    cmds:
      - go test -count=1 ./...

  test:e2e:
    desc: Run end-to-end tests (requires .env and interactive auth)
    deps: [build:all]
    dir: e2e
    preconditions:
      - sh: test -f {{.ROOT_DIR}}/.env
        msg: "No .env found. E2E tests require environment configuration."
    cmds:
      - go test -tags e2e -timeout 3h -v

  test:e2e-aws:
    desc: Run AWS provision/destroy E2E test
    deps: [build:all]
    dir: e2e
    preconditions:
      - sh: test -f {{.ROOT_DIR}}/.env
        msg: "No .env found. E2E tests require environment configuration."
    cmds:
      - go test -tags e2e -timeout 3h -v -run TestAWSProvision

  protogen:
    desc: Generate protobuf and gRPC code (skips if unchanged)
    preconditions:
      - sh: command -v buf
        msg: "buf is not installed. See https://buf.build/docs/installation"
    sources: ['proto/**/*.proto', buf.yaml, buf.gen.yaml, buf.gen.ocp.yaml]
    cmds:
      - buf generate --path proto/fleetshift
      - buf generate --template buf.gen.ocp.yaml --path proto/ocp/v1

  image:build:
    desc: Build fleetshift container images
    cmds:
      - >-
        podman build
        -t fleetshift-server:{{.IMAGE_TAG}}
        -t quay.io/stolostron/fleetshift-server:{{.IMAGE_TAG}}
        {{if .DEV_REGISTRY}}-t {{.DEV_REGISTRY}}/fleetshift-server:{{.IMAGE_TAG}}{{end}}
        .
      - >-
        podman build -f Dockerfile.local
        -t quay.io/stolostron/fleetshift-server-local:{{.IMAGE_TAG}}
        {{if .DEV_REGISTRY}}-t {{.DEV_REGISTRY}}/fleetshift-server-local:{{.IMAGE_TAG}}{{end}}
        .

  image:push:
    desc: Push images to DEV_REGISTRY (never pushes to stolostron)
    preconditions:
      - sh: test -n "{{.DEV_REGISTRY}}"
        msg: "DEV_REGISTRY is not set. Push only targets your personal dev registry."
    cmds:
      - podman push {{.DEV_REGISTRY}}/fleetshift-server:{{.IMAGE_TAG}}
      - podman push {{.DEV_REGISTRY}}/fleetshift-server-local:{{.IMAGE_TAG}}
