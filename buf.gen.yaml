version: v2
clean: true
inputs:
  - directory: proto
    exclude_paths:
      # Addon spec protos are compiled in-process at server startup via
      # protocompile. They must NOT have generated Go code — the dynamic
      # service builder produces descriptors at runtime instead.
      - proto/addons
plugins:
  - remote: buf.build/protocolbuffers/go
    out: fleetshift-server/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: fleetshift-server/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway
    out: fleetshift-server/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: docs/openapi
    opt:
      - output_format=yaml
      - allow_merge=true
      - merge_file_name=fleetshift
