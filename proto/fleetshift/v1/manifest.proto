syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";

// Manifest is an opaque declarative payload delivered to a target.
message Manifest {
  // Opaque dispatch label identifying the manifest kind (e.g. "api.kind.cluster").
  string manifest_type = 1 [(google.api.field_behavior) = REQUIRED];

  // Opaque content of the manifest.
  bytes raw = 2 [(google.api.field_behavior) = REQUIRED];
}
