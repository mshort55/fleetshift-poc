syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

service OCPCallbackService {
  rpc ReportPhaseResult(OCPPhaseResultRequest) returns (OCPAck);
  rpc ReportMilestone(OCPMilestoneRequest) returns (OCPAck);
  rpc ReportCompletion(OCPCompletionRequest) returns (OCPAck);
  rpc ReportFailure(OCPFailureRequest) returns (OCPAck);
}

message OCPPhaseResultRequest {
  string cluster_id = 1;
  string phase = 2;
  string status = 3;
  int32 elapsed_seconds = 4;
  string error = 5;
  int32 attempt = 6;
}

message OCPMilestoneRequest {
  string cluster_id = 1;
  string event = 2;
  int32 elapsed_seconds = 3;
  int32 attempt = 4;
}

message OCPCompletionRequest {
  string cluster_id = 1;
  string infra_id = 2;
  string cluster_uuid = 3;
  string api_server = 4;
  bytes kubeconfig = 5;
  bytes ca_cert = 6;
  bytes ssh_private_key = 7;
  bytes ssh_public_key = 8;
  string region = 9;
  bytes metadata_json = 10;
  bool recovery_attempted = 11;
  int32 elapsed_seconds = 12;
  int32 attempt = 13;
}

message OCPFailureRequest {
  string cluster_id = 1;
  string phase = 2;
  string failure_reason = 3;
  string failure_message = 4;
  string log_tail = 5;
  bool requires_destroy = 6;
  bool recovery_attempted = 7;
  int32 attempt = 8;
}

message OCPAck {}
