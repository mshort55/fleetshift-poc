syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/annotations.proto";
import "google/api/client.proto";
import "fleetshift/v1/auth_method.proto";
import "fleetshift/v1/create_auth_method_request.proto";
import "fleetshift/v1/get_auth_method_request.proto";

// AuthMethodService manages authentication methods.
service AuthMethodService {
  // CreateAuthMethod creates a new authentication method.
  rpc CreateAuthMethod(CreateAuthMethodRequest) returns (AuthMethod) {
    option (google.api.http) = {
      post: "/v1/authMethods"
      body: "auth_method"
    };
    option (google.api.method_signature) = "auth_method,auth_method_id";
  }

  // GetAuthMethod retrieves an authentication method by resource name.
  rpc GetAuthMethod(GetAuthMethodRequest) returns (AuthMethod) {
    option (google.api.http) = {
      get: "/v1/{name=authMethods/*}"
    };
    option (google.api.method_signature) = "name";
  }
}
