syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/annotations.proto";
import "google/api/client.proto";
import "fleetshift/v1/signing_key_binding.proto";
import "fleetshift/v1/create_signing_key_binding_request.proto";

// SigningKeyBindingService manages user signing key enrollments.
service SigningKeyBindingService {
  // CreateSigningKeyBinding enrolls a signing key by validating and
  // storing a key binding bundle.
  rpc CreateSigningKeyBinding(CreateSigningKeyBindingRequest) returns (SigningKeyBinding) {
    option (google.api.http) = {
      post: "/v1/signingKeyBindings"
      body: "*"
    };
    option (google.api.method_signature) = "signing_key_binding_id,key_binding_doc,key_binding_signature,identity_token";
  }
}
