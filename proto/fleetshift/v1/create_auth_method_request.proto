syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";
import "fleetshift/v1/auth_method.proto";

// Request message for
// [AuthMethodService.CreateAuthMethod][fleetshift.v1.AuthMethodService.CreateAuthMethod].
message CreateAuthMethodRequest {
  // The ID to use for the auth method, which becomes the final component
  // of the auth method's resource name.
  string auth_method_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The auth method to create.
  AuthMethod auth_method = 2 [(google.api.field_behavior) = REQUIRED];
}
