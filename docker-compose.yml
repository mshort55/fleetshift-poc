# FleetShift full dev stack — backend + frontend in one compose.
#
# Backend: Keycloak (TLS) + FleetShift Go server
# Frontend: mock-ui-plugins + mock-servers + GUI webpack dev server
#
# The UI repo location is configurable via UI_DIR in .env
# (default: ../fleetshift-user-interface).
#
# Prerequisites:
#   Add "127.0.0.1 keycloak" to /etc/hosts
#
# Usage:
#   docker compose up --build -d
#   Auth is bootstrapped automatically by the auth-setup init service.
#
# Keycloak admin:  https://keycloak:8443  (admin / admin)
# FleetShift API:  http://localhost:8085
# Mock API:        http://localhost:4000
# Mock plugins:    http://localhost:8001
# GUI:             http://localhost:3000

services:
  # ── Backend ──────────────────────────────────────────────────────

  # Init service: generates self-signed TLS certs if they don't exist
  keycloak-certs:
    image: alpine:3
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /certs/keycloak.crt ]; then
          echo "TLS certs already exist, skipping generation"
          exit 0
        fi
        apk add --no-cache openssl > /dev/null
        echo "Generating CA..."
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout /certs/ca.key -out /certs/ca.crt \
          -days 3650 -subj "/CN=FleetShift Local CA" 2>/dev/null
        echo "Generating Keycloak server certificate..."
        openssl req -newkey rsa:2048 -nodes \
          -keyout /certs/keycloak.key -out /tmp/keycloak.csr \
          -subj "/CN=keycloak" 2>/dev/null
        openssl x509 -req -in /tmp/keycloak.csr \
          -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
          -out /certs/keycloak.crt -days 3650 \
          -extfile <(printf "subjectAltName=DNS:keycloak,DNS:localhost") 2>/dev/null
        rm -f /tmp/keycloak.csr /certs/ca.srl
        chmod 644 /certs/*.crt
        chmod 600 /certs/*.key
        echo "TLS certs generated in /certs/"
    volumes:
      - keycloak-certs:/certs

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8180"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/keycloak.key
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8443:8443"
      - "8180:8180"
    volumes:
      - ./deploy/keycloak/fleetshift-realm.json:/opt/keycloak/data/import/fleetshift-realm.json:ro
      - keycloak-certs:/opt/keycloak/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      keycloak-certs:
        condition: service_completed_successfully

  fleetshift:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - serve
      - --http-addr=:8085
      - --grpc-addr=:50051
      - --db=/data/fleetshift.db
      - --log-level=debug
      - --oidc-ca-file=/certs/ca.crt
    environment:
      CONTAINER_HOST: keycloak
      OIDC_HTTPS_PORT: "8443"
      KIND_EXPERIMENTAL_DOCKER_NETWORK: fleetshift
    ports:
      - "8085:8085"
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - keycloak-certs:/certs:ro
      - /tmp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/v1/deployments"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      keycloak:
        condition: service_healthy

  # Init service: bootstrap OIDC auth method so the UI can log in via Keycloak.
  # Registers the HTTP issuer (browser login) — kind clusters use HTTPS issuer
  # separately via fleetctl auth setup.
  auth-setup:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        fleetctl auth setup \
          --server fleetshift:50051 \
          --issuer-url http://keycloak:8180/auth/realms/fleetshift \
          --client-id fleetshift-ui \
          --audience fleetshift-ui \
        && echo "Auth method registered." \
        || echo "Auth setup failed (may already exist) — continuing."
    depends_on:
      fleetshift:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────

  mock-ui-plugins:
    build:
      context: ${UI_DIR:-./../fleetshift-user-interface}
      dockerfile: Dockerfile.mock-ui-plugins
    # Build happens in the Dockerfile; just serve the pre-built dist.
    command: ["npm", "run", "serve:dist", "-w", "packages/mock-ui-plugins"]
    ports:
      - "8001:8001"
    volumes:
      - ui-plugins-dist:/opt/app-root/src/packages/mock-ui-plugins/dist

  mock-servers:
    build:
      context: ${UI_DIR:-./../fleetshift-user-interface}
      dockerfile: Dockerfile.mock-servers
    ports:
      - "4000:4000"
    volumes:
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/mock-servers/src:/opt/app-root/src/packages/mock-servers/src:ro
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/common/src:/opt/app-root/src/packages/common/src:ro
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/mock-servers/.env:/opt/app-root/src/packages/mock-servers/.env:ro
      - ui-plugins-dist:/opt/app-root/src/packages/mock-ui-plugins/dist:ro
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/mock-cli-plugins/dist/cli-plugin-registry.json:/opt/app-root/src/packages/mock-cli-plugins/dist/cli-plugin-registry.json:ro
      - ${KUBECONFIG:-~/.kube/config}:/tmp/kubeconfig:ro
      - ${MINIKUBE_HOME:-~/.minikube}:/tmp/.minikube:ro
      - keycloak-certs:/certs:ro
    environment:
      MODE: live
      K8S_TLS_INSECURE: "1"
      KEYCLOAK_URL: http://keycloak:8180/auth
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
      MANAGEMENT_API_TARGET: http://fleetshift:8085
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/4000"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      mock-ui-plugins:
        condition: service_started
      keycloak:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        # clusters.yaml is optional — create it if missing so the server
        # doesn't fail on a missing-file check (Docker would have created
        # a directory if the host file didn't exist).
        CLUSTERS_YAML=packages/mock-servers/clusters.yaml
        if [ -d "$$CLUSTERS_YAML" ]; then rm -rf "$$CLUSTERS_YAML"; fi
        [ -f "$$CLUSTERS_YAML" ] || touch "$$CLUSTERS_YAML"
        # Rewrite kubeconfig: remap 127.0.0.1 → host.docker.internal
        # and remap cert paths to the mounted .minikube volume
        sed \
          -e 's|server: https://127.0.0.1:|server: https://host.docker.internal:|g' \
          -e "s|$$HOME/.minikube|/tmp/.minikube|g" \
          -e 's|/Users/[^/]*/.minikube|/tmp/.minikube|g' \
          /tmp/kubeconfig > /tmp/kubeconfig-docker
        export KUBECONFIG=/tmp/kubeconfig-docker
        exec npm run dev -w packages/mock-servers

  gui:
    build:
      context: ${UI_DIR:-./../fleetshift-user-interface}
      dockerfile: Dockerfile.gui
    ports:
      - "3000:3000"
    volumes:
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/gui/src:/opt/app-root/src/packages/gui/src:ro
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/gui/webpack.config.ts:/opt/app-root/src/packages/gui/webpack.config.ts:ro
      - ${UI_DIR:-./../fleetshift-user-interface}/packages/common/src:/opt/app-root/src/packages/common/src:ro
      - keycloak-certs:/certs:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8180/auth
      API_PROXY_TARGET: http://mock-servers:4000
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
    depends_on:
      mock-servers:
        condition: service_healthy

volumes:
  keycloak-certs:
  ui-plugins-dist:

networks:
  default:
    name: fleetshift
