name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TESTCONTAINERS_PROVIDER: docker

jobs:
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        module: [fleetshift-server, fleetshift-cli]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Detect Docker host address for kind OIDC tests
        if: matrix.module == 'fleetshift-server'
        run: echo "KIND_HOST_ADDR=$(docker network inspect bridge --format '{{(index .IPAM.Config 0).Gateway}}')" >> "$GITHUB_ENV"

      - name: Run all unit tests
        working-directory: ${{ matrix.module }}
        run: go test -count=1 -timeout 15m ./...

      - name: Run kind docker integration tests
        if: matrix.module == 'fleetshift-server'
        working-directory: ${{ matrix.module }}
        run: go test -tags integration -count=1 -timeout 15m ./internal/addon/kind/

      - name: Run kubernetes docker integration tests
        if: matrix.module == 'fleetshift-server'
        working-directory: ${{ matrix.module }}
        run: go test -tags integration -count=1 -timeout 15m ./internal/addon/kubernetes/

      - name: Run kubernetes race tests
        if: matrix.module == 'fleetshift-server'
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./internal/addon/kubernetes/

  deploy-scripts:
    name: Deploy script contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run deploy contract tests
        run: bash deploy/scripts/test-gcphcp-defaults.sh
