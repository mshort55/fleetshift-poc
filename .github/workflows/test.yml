name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TESTCONTAINERS_PROVIDER: docker

jobs:
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        module: [fleetshift-server, fleetshift-cli, ocp-engine]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -count=1 -timeout 15m ./...
