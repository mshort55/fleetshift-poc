# FleetShift production-like deployment — pre-built images, no source mounts.
#
# Prerequisites:
#   - Add "127.0.0.1 keycloak" to /etc/hosts
#   - Build images first (see deploy/podman/README.md)
#   - jq installed (for realm password generation)
#
# Usage:
#   make up       — generate realm passwords, start stack
#   make down     — stop stack, preserve data
#   make clean    — stop stack, delete all data
#
# Keycloak (demo mode) is enabled via the "demo" profile.
# To disable: DEMO_MODE=false make up

services:
  # ── Init: TLS certs (demo mode only) ────────────────────────────
  keycloak-certs:
    image: alpine:3
    profiles: ["demo"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /certs/keycloak.crt ]; then
          echo "TLS certs already exist, skipping generation"
          exit 0
        fi
        apk add --no-cache openssl > /dev/null
        echo "Generating CA..."
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout /certs/ca.key -out /certs/ca.crt \
          -days 3650 -subj "/CN=FleetShift Local CA" 2>/dev/null
        echo "Generating Keycloak server certificate..."
        openssl req -newkey rsa:2048 -nodes \
          -keyout /certs/keycloak.key -out /tmp/keycloak.csr \
          -subj "/CN=keycloak" 2>/dev/null
        openssl x509 -req -in /tmp/keycloak.csr \
          -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
          -out /certs/keycloak.crt -days 3650 \
          -extfile <(printf "subjectAltName=DNS:keycloak,DNS:localhost") 2>/dev/null
        rm -f /tmp/keycloak.csr /certs/ca.srl
        chmod 644 /certs/*.crt
        chmod 644 /certs/*.key
        echo "TLS certs generated in /certs/"
    volumes:
      - keycloak-certs:/certs

  # ── Keycloak (demo mode only) ───────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    profiles: ["demo"]
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "${KC_HTTP_PORT:-8180}"
      KC_HTTPS_PORT: "${KC_HTTPS_PORT:-8443}"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/keycloak.key
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KC_HOSTNAME:-keycloak}
      KC_HOSTNAME_PORT: "${KC_HTTP_PORT:-8180}"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KC_HTTPS_PORT:-8443}:${KC_HTTPS_PORT:-8443}"
      - "${KC_HTTP_PORT:-8180}:${KC_HTTP_PORT:-8180}"
    volumes:
      - keycloak-certs:/opt/keycloak/certs:ro
      - ${REALM_JSON:-./.realm.json}:/opt/keycloak/data/import/fleetshift-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/${KC_HTTP_PORT:-8180}"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      keycloak-certs:
        condition: service_completed_successfully

  # ── FleetShift Server ───────────────────────────────────────────
  fleetshift-server:
    image: ${IMAGE_REGISTRY:-quay.io/rheemshort}/fleetshift-server:${IMAGE_TAG:-0.1.0}
    command:
      - serve
      - --http-addr=:${FLEETSHIFT_SERVER_HTTP_PORT:-8085}
      - --grpc-addr=:${FLEETSHIFT_SERVER_GRPC_PORT:-50051}
      - --db=/data/fleetshift.db
      - --log-level=${FLEETSHIFT_LOG_LEVEL:-debug}
      - --oidc-ca-file=/certs/ca.crt
    environment:
      CONTAINER_HOST: keycloak
      OIDC_HTTPS_PORT: "${KC_HTTPS_PORT:-8443}"
      KIND_EXPERIMENTAL_DOCKER_NETWORK: fleetshift
    ports:
      - "${FLEETSHIFT_SERVER_HTTP_PORT:-8085}:${FLEETSHIFT_SERVER_HTTP_PORT:-8085}"
      - "${FLEETSHIFT_SERVER_GRPC_PORT:-50051}:${FLEETSHIFT_SERVER_GRPC_PORT:-50051}"
    volumes:
      - fleetshift-data:/data
      - keycloak-certs:/certs:ro
      - ${PODMAN_SOCKET:-/run/user/1000/podman/podman.sock}:/var/run/docker.sock
      - /tmp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${FLEETSHIFT_SERVER_HTTP_PORT:-8085}/v1/deployments"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ── Init: OIDC auth registration (demo mode only) ──────────────
  auth-setup:
    image: ${IMAGE_REGISTRY:-quay.io/rheemshort}/fleetshift-server:${IMAGE_TAG:-0.1.0}
    profiles: ["demo"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        fleetctl auth setup \
          --server fleetshift-server:${FLEETSHIFT_SERVER_GRPC_PORT:-50051} \
          --issuer-url ${OIDC_ISSUER_URL:-http://keycloak:8180/auth/realms/fleetshift} \
          --client-id ${OIDC_CLIENT_ID:-fleetshift-ui} \
          --audience ${OIDC_AUDIENCE:-fleetshift-ui} \
        && echo "Auth method registered." \
        || echo "Auth setup failed (may already exist) — continuing."
    depends_on:
      fleetshift-server:
        condition: service_healthy

  # ── Mock UI Plugins ─────────────────────────────────────────────
  fleetshift-mock-ui-plugins:
    image: ${IMAGE_REGISTRY:-quay.io/rheemshort}/fleetshift-mock-ui-plugins:${IMAGE_TAG:-0.1.0}
    command: ["npm", "run", "serve:dist", "-w", "packages/mock-ui-plugins"]
    ports:
      - "8001:8001"
    volumes:
      - ui-plugins-dist:/opt/app-root/src/packages/mock-ui-plugins/dist

  # ── Mock Servers ────────────────────────────────────────────────
  fleetshift-mock-servers:
    image: ${IMAGE_REGISTRY:-quay.io/rheemshort}/fleetshift-mock-servers:${IMAGE_TAG:-0.1.0}
    environment:
      MODE: ${MODE:-live}
      MANAGEMENT_API_TARGET: ${MANAGEMENT_API_TARGET:-http://fleetshift-server:8085}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8180/auth}
      K8S_TLS_INSECURE: "${K8S_TLS_INSECURE:-1}"
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
    ports:
      - "4000:4000"
    volumes:
      - fleetshift-mock-servers-db:/opt/app-root/src/packages/mock-servers/data
      - ui-plugins-dist:/opt/app-root/src/packages/mock-ui-plugins/dist:ro
      - keycloak-certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/4000"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      fleetshift-mock-ui-plugins:
        condition: service_started
      fleetshift-server:
        condition: service_healthy

  # ── GUI ─────────────────────────────────────────────────────────
  fleetshift-gui:
    image: ${IMAGE_REGISTRY:-quay.io/rheemshort}/fleetshift-gui:${IMAGE_TAG:-0.1.0}
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://fleetshift-mock-servers:4000}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8180/auth}
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
    ports:
      - "3000:3000"
    volumes:
      - keycloak-certs:/certs:ro
    depends_on:
      fleetshift-mock-servers:
        condition: service_healthy

volumes:
  fleetshift-data:
  fleetshift-mock-servers-db:
  keycloak-certs:
  ui-plugins-dist:

networks:
  default:
    name: fleetshift
