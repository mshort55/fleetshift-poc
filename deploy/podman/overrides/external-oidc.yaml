services:
  auth-setup:
    image: ${FLEETSHIFT_SERVER_IMAGE:-quay.io/stolostron/fleetshift-server-local:latest}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ARGS="--server fleetshift-server:${FLEETSHIFT_SERVER_GRPC_PORT}"
        ARGS="$$ARGS --issuer-url ${OIDC_ISSUER_URL}"
        ARGS="$$ARGS --client-id ${OIDC_CLI_CLIENT_ID}"
        ARGS="$$ARGS --audience ${OIDC_AUDIENCE}"
        ARGS="$$ARGS --key-enrollment-client-id fleetshift-signing"
        ARGS="$$ARGS --registry-id github.com"
        ARGS="$$ARGS --registry-subject-expression claims.github_username"
        for i in $(seq 1 30); do
          fleetctl auth setup $$ARGS && break
          echo "Server not ready, retrying in 2s... ($$i/30)"
          sleep 2
        done
    depends_on:
      fleetshift-server:
        condition: service_started
    networks:
      - default
