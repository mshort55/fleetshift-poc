# Dev override — build from source with hot-reload.
#
# Layered on top of the base compose + db + auth overrides.
# Activated by DEV=true (e.g. `task deploy:dev`).
#
# Requires UI_DIR in .env (default: ../../../fleetshift-user-interface,
# relative to deploy/podman/).

services:

  # ── Frontend builder (init container) ─────────────────────────
  # Builds all frontend assets inside a container and copies them
  # to a shared volume. No host node/npm required.

  web-builder:
    build:
      context: ${UI_DIR:-../../../fleetshift-user-interface}
      dockerfile: Dockerfile.web
    privileged: true
    volumes:
      - web-assets:/output

  # ── Backend ────────────────────────────────────────────────────

  fleetshift-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
      - web-assets:/srv/web:ro
    depends_on:
      web-builder:
        condition: service_completed_successfully

volumes:
  web-assets:
