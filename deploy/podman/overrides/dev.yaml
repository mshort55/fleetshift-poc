# Dev override — build from source with hot-reload.
#
# Layered on top of the base compose + db + auth overrides.
# Activated by DEV=true (e.g. `task deploy:dev`).
#
# Requires UI_DIR in .env (default: ../../../fleetshift-user-interface,
# relative to deploy/podman/).

services:

  # ── Frontend builder — build from source instead of prebuilt image ──

  web-builder:
    build:
      context: ${UI_DIR:-../../../fleetshift-user-interface}
      dockerfile: Dockerfile.web
    privileged: true

  # ── Backend — extend base image with local tooling ──────────────

  fleetshift-server:
    build:
      context: ../..
      dockerfile: Dockerfile.local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
