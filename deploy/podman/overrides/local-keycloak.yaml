services:
  keycloak-certs:
    image: alpine:3
    command: /scripts/generate-certs.sh
    volumes:
      - keycloak-certs:/certs
      - ./scripts/generate-certs.sh:/scripts/generate-certs.sh:ro

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD
      - KC_HTTP_ENABLED=true
      - KC_HTTP_PORT=${KC_HTTP_PORT}
      - KC_HTTPS_PORT=${KC_HTTPS_PORT}
      - KC_HTTPS_CERTIFICATE_FILE=/opt/keycloak/certs/keycloak.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/keycloak/certs/keycloak.key
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_HOSTNAME=${KC_HOSTNAME}
      - KC_HOSTNAME_PORT=${KC_HTTP_PORT}
      - KC_HOSTNAME_STRICT=false
    ports:
      - "${KC_HTTPS_PORT}:${KC_HTTPS_PORT}"
      - "${KC_HTTP_PORT}:${KC_HTTP_PORT}"
    volumes:
      - keycloak-certs:/opt/keycloak/certs:ro
      - ./.realm.json:/opt/keycloak/data/import/fleetshift-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/${KC_HTTP_PORT}"]
      interval: 5s
      timeout: 3s
      retries: 30
    depends_on:
      keycloak-certs:
        condition: service_completed_successfully

  fleetshift-server:
    command:
      - serve
      - ${DB_FLAG}
      - --http-addr=:${FLEETSHIFT_SERVER_HTTP_PORT}
      - --grpc-addr=:${FLEETSHIFT_SERVER_GRPC_PORT}
      - --log-level=${FLEETSHIFT_LOG_LEVEL}
      - --oidc-ca-file=/certs/ca.crt
    environment:
      OIDC_HTTPS_PORT: "${KC_HTTPS_PORT}"
    volumes:
      - keycloak-certs:/certs:ro
    depends_on:
      keycloak-certs:
        condition: service_completed_successfully

  fleetshift-mock-servers:
    environment:
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
    volumes:
      - keycloak-certs:/certs:ro

  fleetshift-gui:
    environment:
      NODE_EXTRA_CA_CERTS: /certs/ca.crt
    volumes:
      - keycloak-certs:/certs:ro

  auth-setup:
    image: ${FLEETSHIFT_SERVER_IMAGE:-quay.io/stolostron/fleetshift-server:latest}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ARGS="--server fleetshift-server:${FLEETSHIFT_SERVER_GRPC_PORT}"
        ARGS="$$ARGS --issuer-url http://${KC_HOSTNAME}:${KC_HTTP_PORT}/auth/realms/fleetshift"
        ARGS="$$ARGS --client-id ${OIDC_CLIENT_ID}"
        ARGS="$$ARGS --audience ${OIDC_AUDIENCE}"
        [ -n "${KEY_ENROLLMENT_CLIENT_ID:-}" ] && ARGS="$$ARGS --key-enrollment-client-id ${KEY_ENROLLMENT_CLIENT_ID:-}"
        [ -n "${KEY_REGISTRY_ID:-}" ] && ARGS="$$ARGS --registry-id ${KEY_REGISTRY_ID:-}"
        [ -n "${KEY_REGISTRY_SUBJECT_EXPR:-}" ] && ARGS="$$ARGS --registry-subject-expression ${KEY_REGISTRY_SUBJECT_EXPR:-}"
        [ -n "${PUBLIC_KEY_CLAIM_EXPR:-}" ] && ARGS="$$ARGS --public-key-claim-expression ${PUBLIC_KEY_CLAIM_EXPR:-}"
        fleetctl auth setup $$ARGS \
          && echo "Auth method registered." \
          || echo "Auth setup failed (may already exist) — continuing."
    depends_on:
      fleetshift-server:
        condition: service_healthy

volumes:
  keycloak-certs:
