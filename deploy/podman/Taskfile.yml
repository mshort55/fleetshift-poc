version: '3'

vars:
  RESOLVED_DEPLOY_MODE: '{{if empty .DEPLOY_MODE_INPUT}}demo{{else}}{{.DEPLOY_MODE_INPUT}}{{end}}'
  RESOLVED_DB: '{{if not (empty .DB_INPUT)}}{{.DB_INPUT}}{{else if eq .RESOLVED_DEPLOY_MODE "prod"}}postgres{{else}}sqlite{{end}}'
  RESOLVED_AUTH: '{{if not (empty .AUTH_INPUT)}}{{.AUTH_INPUT}}{{else if eq .RESOLVED_DEPLOY_MODE "prod"}}external{{else}}local{{end}}'
  DEV: '{{.DEV | default "false"}}'
  BUILD: '{{.BUILD | default "false"}}'
  RESOLVED_DB_FLAG:
    sh: |
      if [ "{{.RESOLVED_DB}}" = "postgres" ]; then
        echo "--database-url=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      else
        echo "--db=/data/fleetshift.db"
      fi
  RESOLVED_COMPOSE_FILES:
    sh: |
      FILES="-f compose.yaml -f overrides/{{.RESOLVED_DB}}.yaml -f overrides/{{if eq .RESOLVED_AUTH "local"}}local-keycloak{{else}}external-oidc{{end}}.yaml"
      if [ "{{.DEV}}" = "true" ]; then
        FILES="$FILES -f overrides/dev.yaml"
      fi
      echo "$FILES"

tasks:
  up:
    desc: Start the FleetShift stack (set DEPLOY_MODE, DB, AUTH to customize)
    env: &deploy_env
      DEPLOY_MODE: '{{.RESOLVED_DEPLOY_MODE}}'
      DB: '{{.RESOLVED_DB}}'
      AUTH: '{{.RESOLVED_AUTH}}'
      DB_FLAG: '{{.RESOLVED_DB_FLAG}}'
      COMPOSE_FILES: '{{.RESOLVED_COMPOSE_FILES}}'
      DEV: '{{.DEV}}'
      BUILD: '{{.BUILD}}'
    preconditions:
      - sh: test -f {{.ROOT_DIR}}/.env
        msg: "No .env found. Copy .env.template to .env first."
      - sh: command -v podman
        msg: "podman is not installed."
      - sh: command -v docker-compose
        msg: "docker-compose is not installed. Install: brew install docker-compose (podman-compose is not compatible)"
      - sh: echo "{{.RESOLVED_DEPLOY_MODE}}" | grep -qE '^(demo|prod)$'
        msg: "DEPLOY_MODE must be demo or prod, got: {{.RESOLVED_DEPLOY_MODE}}"
      - sh: echo "{{.RESOLVED_DB}}" | grep -qE '^(sqlite|postgres)$'
        msg: "DB must be sqlite or postgres, got: {{.RESOLVED_DB}}"
      - sh: echo "{{.RESOLVED_AUTH}}" | grep -qE '^(local|external)$'
        msg: "AUTH must be local or external, got: {{.RESOLVED_AUTH}}"
      - sh: '{{if eq .RESOLVED_AUTH "external"}}[ "{{.OIDC_ISSUER_URL}}" != "<no value>" ] && test -n "{{.OIDC_ISSUER_URL}}"{{else}}true{{end}}'
        msg: "OIDC_ISSUER_URL is required when AUTH=external"
    cmds:
      - ./scripts/start.sh

  dev:
    desc: Start in dev mode — source mounts + hot-reload
    cmds:
      - task: up
        vars:
          DEV: "true"

  build:
    desc: Build container images without restarting services
    env: *deploy_env
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env build

  rebuild:
    desc: Stop, rebuild images, and restart
    cmds:
      - ./scripts/stop.sh
      - task: up
        vars:
          DEV: '{{.DEV}}'
          BUILD: "true"

  pull:
    desc: Pull latest container images
    env: *deploy_env
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env pull --ignore-buildable

  down:
    desc: Stop all containers, preserve data
    cmds:
      - ./scripts/stop.sh

  clean:
    desc: Stop all containers and remove all data (volumes, network)
    cmds:
      - ./scripts/stop.sh --clean

  logs:
    desc: Tail logs from all FleetShift containers
    env: *deploy_env
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env logs -f

  'logs:*':
    desc: "Tail logs from a specific container (e.g. task deploy:logs:fleetshift-server)"
    env: *deploy_env
    vars:
      CONTAINER: '{{index .MATCH 0}}'
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env logs -f {{.CONTAINER}}

  status:
    desc: Show running FleetShift containers
    env: *deploy_env
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env ps

  'restart:*':
    desc: "Restart a specific container (e.g. task deploy:restart:keycloak)"
    env: *deploy_env
    vars:
      CONTAINER: '{{index .MATCH 0}}'
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env restart {{.CONTAINER}}

  cli-setup:
    desc: Configure fleetctl CLI for local deployment
    cmds:
      - ./scripts/cli-setup.sh

  reset-keycloak:
    desc: Wipe Keycloak state and re-import realm (AUTH=local only)
    env: *deploy_env
    preconditions:
      - sh: '[ "{{.RESOLVED_AUTH}}" = "local" ]'
        msg: "reset-keycloak only works with AUTH=local (no local Keycloak with external auth)"
    cmds:
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env stop keycloak
      - podman compose {{.RESOLVED_COMPOSE_FILES}} --env-file {{.ROOT_DIR}}/.env rm -f keycloak
      - podman volume rm fleetshift_keycloak-certs 2>/dev/null || podman volume rm keycloak-certs 2>/dev/null || true
      - rm -f .realm.json
      - echo "Keycloak state wiped. Run 'task deploy:up' to restart with fresh realm and passwords."
