# FleetShift deployment — composable via override files.
#
# Usage (via Taskfile):
#   task deploy:up                         — demo: sqlite + local keycloak
#   task deploy:up DEPLOY_MODE=prod        — prod: postgres + external oidc
#   task deploy:up DB=postgres AUTH=local  — override: postgres + local keycloak
#
# Override files are in deploy/podman/overrides/ and layered by scripts/common.sh.
# Do not use `podman compose` directly — use `task deploy:*` targets instead.

# ── Shared fleetshift-server config ──────────────────────────────────
x-fleetshift-server: &fleetshift-server
  image: ${FLEETSHIFT_SERVER_IMAGE:-quay.io/stolostron/fleetshift-server:latest}
  restart: unless-stopped
  privileged: true
  user: "0:0"
  environment:
    KIND_TEMP_DIR: "${KIND_TEMP_DIR:-/tmp}"
    KIND_EXPERIMENTAL_DOCKER_NETWORK: kind
    CONTAINER_HOST: "unix:///var/run/docker.sock"
  ports:
    - "${FLEETSHIFT_SERVER_HTTP_PORT}:${FLEETSHIFT_SERVER_HTTP_PORT}"
    - "${FLEETSHIFT_SERVER_GRPC_PORT}:${FLEETSHIFT_SERVER_GRPC_PORT}"
  volumes:
    - ${PODMAN_SOCKET:-/dev/null}:/var/run/docker.sock
    - ${KIND_TEMP_DIR:-/tmp}:${KIND_TEMP_DIR:-/tmp}
  networks:
    - default
    - kind
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:${FLEETSHIFT_SERVER_HTTP_PORT}/v1/deployments"]
    interval: 5s
    timeout: 3s
    retries: 30

services:

  # ── Core ────────────────────────────────────────────────────────

  fleetshift-server:
    <<: *fleetshift-server
    command:
      - serve
      - ${DB_FLAG}
      - --http-addr=:${FLEETSHIFT_SERVER_HTTP_PORT}
      - --grpc-addr=:${FLEETSHIFT_SERVER_GRPC_PORT}
      - --log-level=${FLEETSHIFT_LOG_LEVEL}
      - --web-dir=${FLEETSHIFT_WEB_DIR:-/srv/web}
      - --oidc-ui-authority=${OIDC_UI_AUTHORITY:-${OIDC_ISSUER_URL}}
      - --oidc-ui-client-id=${OIDC_UI_CLIENT_ID:-fleetshift-ui}

networks:
  default:
    name: fleetshift
  kind:
    name: kind
    external: true
