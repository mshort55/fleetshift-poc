version: '3'

vars:
  KC_CLUSTER_CHECK: '[ -n "${KC_CLUSTER_API}" ] && oc whoami --show-server 2>/dev/null | grep -qF "${KC_CLUSTER_API}"'
  KC_CLUSTER_MSG: "Wrong cluster or KC_CLUSTER_API not set. This task requires the Keycloak OCP cluster. Set KC_CLUSTER_API in .env and run: oc login ${KC_CLUSTER_API:-<keycloak-cluster-url>}"

tasks:
  deploy:
    desc: Deploy Keycloak to OpenShift (cert-manager, RHBK, PostgreSQL, realm import)
    requires:
      vars: [ACME_EMAIL]
    vars:
      BASE_DOMAIN: '{{.BASE_DOMAIN | default ""}}'
      FRESH_CERT: '{{.FRESH_CERT | default ""}}'
    preconditions:
      - sh: '{{.KC_CLUSTER_CHECK}}'
        msg: '{{.KC_CLUSTER_MSG}}'
    cmds:
      - >-
        ./scripts/deploy.sh
        --acme-email {{.ACME_EMAIL}}
        {{if .BASE_DOMAIN}}--base-domain {{.BASE_DOMAIN}}{{end}}
        {{if eq .FRESH_CERT "true"}}--fresh-cert{{end}}

  teardown:
    desc: Tear down Keycloak deployment from OpenShift (interactive)
    interactive: true
    preconditions:
      - sh: '{{.KC_CLUSTER_CHECK}}'
        msg: '{{.KC_CLUSTER_MSG}}'
    cmds:
      - ./scripts/teardown.sh

  add-base-domain:
    desc: Add a cluster's console redirect URI to the ocp-console Keycloak client
    requires:
      vars: [BASE_DOMAIN, CLUSTER_NAME]
    preconditions:
      - sh: '{{.KC_CLUSTER_CHECK}}'
        msg: '{{.KC_CLUSTER_MSG}}'
    cmds:
      - ./scripts/add-base-domain.sh --base-domain {{.BASE_DOMAIN}} --cluster-name {{.CLUSTER_NAME}}

  reset-realm:
    desc: Reset the FleetShift realm to match the realm config file (Keycloak stays up)
    interactive: true
    preconditions:
      - sh: '{{.KC_CLUSTER_CHECK}}'
        msg: '{{.KC_CLUSTER_MSG}}'
    cmds:
      - ./scripts/reset-realm.sh

  add-user:
    desc: Add or update a user in the FleetShift Keycloak realm
    requires:
      vars: [USERNAME, PASSWORD, GITHUB]
    vars:
      ROLES: '{{.ROLES | default ""}}'
      ADMIN_PASSWORD: '{{.ADMIN_PASSWORD | default ""}}'
    preconditions:
      - sh: '[ -n "{{.ADMIN_PASSWORD}}" ] || ({{.KC_CLUSTER_CHECK}})'
        msg: "Wrong cluster or KC_CLUSTER_API not set. This task requires the Keycloak OCP cluster. For local mode, pass ADMIN_PASSWORD instead. Set KC_CLUSTER_API in .env and run: oc login ${KC_CLUSTER_API:-<keycloak-cluster-url>}"
    cmds:
      - >-
        ./scripts/add-user.sh
        --username {{.USERNAME}}
        --password {{.PASSWORD}}
        --github {{.GITHUB}}
        {{if .ADMIN_PASSWORD}}--admin-password {{.ADMIN_PASSWORD}}{{end}}
        {{if .ROLES}}--roles {{.ROLES}}{{end}}
