apiVersion: batch/v1
kind: Job
metadata:
  name: auth-setup
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-server
          image: quay.io/stolostron/fleetshift-server:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for fleetshift-server to be ready..."
              until curl -sf http://fleetshift-server:8085/v1/deployments > /dev/null 2>&1; do
                echo "  not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "fleetshift-server is ready."
      containers:
        - name: auth-setup
          image: quay.io/stolostron/fleetshift-server:latest
          env:
            - name: HOME
              value: /tmp
          command: ["sh", "-c"]
          args:
            - |
              set -e
              fleetctl auth setup \
                --server fleetshift-server:50051 \
                --issuer-url ${OIDC_ISSUER_URL} \
                --client-id ${OIDC_CLIENT_ID} \
                --audience ${OIDC_AUDIENCE} \
                --key-enrollment-client-id ${KEY_ENROLLMENT_CLIENT_ID} \
                --registry-id ${KEY_REGISTRY_ID} \
                --registry-subject-expression "${KEY_REGISTRY_SUBJECT_EXPR}"
              echo "Auth method registered."
          envFrom:
            - configMapRef:
                name: fleetshift-server-config
