apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: fleetshift-server
spec:
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/stolostron/fleetshift-server:latest
      importPolicy:
        scheduled: true
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: fleetshift-web
spec:
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/stolostron/fleetshift-web:latest
      importPolicy:
        scheduled: true
