apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: __ISSUER_NAME__
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: __ISSUER_NAME__-account-key
    solvers:
      - http01:
          ingress: {}
