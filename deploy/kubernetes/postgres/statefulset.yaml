apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER_FILE
              value: /run/secrets/postgres-user
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/postgres-password
            - name: POSTGRES_DB_FILE
              value: /run/secrets/postgres-db
          volumeMounts:
            - name: pg-credentials
              mountPath: /run/secrets
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fleetshift"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: pg-credentials
          secret:
            secretName: postgres-credentials
            items:
              - key: POSTGRES_USER
                path: postgres-user
              - key: POSTGRES_PASSWORD
                path: postgres-password
              - key: POSTGRES_DB
                path: postgres-db
            defaultMode: 0400
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
