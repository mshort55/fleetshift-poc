version: '3'

vars:
  NAMESPACE: fleetshift

tasks:
  deploy:
    desc: Deploy FleetShift to OpenShift (kustomize manifests, images, auth-setup)
    cmds:
      - ./scripts/deploy.sh

  teardown:
    desc: Tear down FleetShift from OpenShift (kustomize delete + namespace)
    preconditions:
      - sh: oc get namespace {{.NAMESPACE}} &>/dev/null
        msg: "Namespace '{{.NAMESPACE}}' not found — nothing to tear down."
    cmds:
      - ./scripts/teardown.sh

  status:
    desc: Show pods, services, and routes in the fleetshift namespace
    cmds:
      - oc get all -n {{.NAMESPACE}}
      - |
        TAG=$(oc get imagestream fleetshift-server -n {{.NAMESPACE}} -o jsonpath='{.spec.tags[0].from.name}' 2>/dev/null)
        DEFAULT="quay.io/stolostron/fleetshift-server:latest"
        if [ "$TAG" != "$DEFAULT" ] && [ -n "$TAG" ]; then
          echo "IMAGE OVERRIDE ACTIVE: $TAG"
        fi

  logs:
    desc: Tail logs from the fleetshift-server deployment
    cmds:
      - oc logs -f deployment/fleetshift-server -n {{.NAMESPACE}} --all-containers

  'logs:*':
    desc: "Tail logs from a specific pod (e.g. task kubernetes:logs:postgres-0)"
    vars:
      POD: '{{index .MATCH 0}}'
    cmds:
      - oc logs -f {{.POD}} -n {{.NAMESPACE}} --all-containers

  set-image:
    desc: "Override the fleetshift-server image tag via ImageStream (e.g. task kubernetes:set-image TAG=PR48-abc123)"
    preconditions:
      - sh: test -n "{{.TAG}}"
        msg: "TAG is required. Usage: task kubernetes:set-image TAG=<image-tag>"
    cmds:
      - oc tag quay.io/stolostron/fleetshift-server:{{.TAG}} fleetshift-server:latest -n {{.NAMESPACE}}
      - echo "ImageStream fleetshift-server:latest → quay.io/stolostron/fleetshift-server:{{.TAG}}"
      - echo "Deployment will roll out automatically via image trigger."

  reset-image:
    desc: Reset fleetshift-server image to the default :latest tag
    cmds:
      - oc tag --scheduled quay.io/stolostron/fleetshift-server:latest fleetshift-server:latest -n {{.NAMESPACE}}
      - echo "ImageStream fleetshift-server:latest → quay.io/stolostron/fleetshift-server:latest (scheduled import restored)"

  import-images:
    desc: Force reimport of images from quay.io
    cmds:
      - oc import-image fleetshift-server:latest -n {{.NAMESPACE}} --confirm
      - oc import-image fleetshift-web:latest -n {{.NAMESPACE}} --confirm

  register-redirect:
    desc: "Register the UI redirect URI in Keycloak (e.g. task kubernetes:register-redirect USER=admin PASSWORD=secret)"
    preconditions:
      - sh: test -n "{{.USER}}"
        msg: "USER is required. Usage: task kubernetes:register-redirect USER=admin PASSWORD=secret"
      - sh: test -n "{{.PASSWORD}}"
        msg: "PASSWORD is required. Usage: task kubernetes:register-redirect USER=admin PASSWORD=secret"
    cmds:
      - ./scripts/register-redirect.sh {{.USER}} {{.PASSWORD}}

  auth-setup:
    desc: Re-run the auth-setup job (deletes previous job first)
    cmds:
      - oc delete job auth-setup -n {{.NAMESPACE}} --ignore-not-found=true
      - oc apply -f auth-setup/job.yaml -n {{.NAMESPACE}}
      - echo "Waiting for auth-setup to complete..."
      - oc wait -n {{.NAMESPACE}} job/auth-setup --for=condition=Complete --timeout=120s

  'grpc-route-cert:deploy':
    desc: "Deploy a cert-manager-backed trusted certificate for the grpc Route"
    preconditions:
      - sh: test -n "{{.ACME_EMAIL}}"
        msg: "ACME_EMAIL is required. Usage: task kubernetes:grpc-route-cert:deploy ACME_EMAIL=you@example.com"
    cmds:
      - >-
        ./grpc-route-cert/scripts/deploy.sh
        --acme-email "{{.ACME_EMAIL}}"
        {{if eq (.FRESH_CERT | default "false") "true"}}--fresh-cert{{end}}

  'grpc-route-cert:teardown':
    desc: Remove the cert-manager-backed certificate integration from the grpc Route
    interactive: true
    cmds:
      - ./grpc-route-cert/scripts/teardown.sh
